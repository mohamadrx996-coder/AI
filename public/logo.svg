<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 30 30" style="enable-background:new 0 0 30 30;" xml:space="preserve">
<defs>
  <!-- تدرج لوني يدمج الأحمر والأزرق بشكل احترافي -->
  <linearGradient id="redBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FF3B30" />
    <stop offset="100%" stop-color="#007AFF" />
  </linearGradient>
  
  <style type="text/css">
    .circle-bg { fill: url(#redBlueGradient); stroke: #FFFFFF; stroke-width: 0.6317; stroke-miterlimit: 10; }
    .st23 { fill: #FFFFFF; }

    .z-breathe {
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.8; transform: scale(1); transform-origin: center; }
      50% { opacity: 1; transform: scale(1.03); transform-origin: center; }
    }
  </style>
</defs>

<g>
  <!-- خلفية دائرية مدمجة باللونين الأحمر والأزرق -->
  <circle class="circle-bg" cx="15" cy="15" r="13.5"/>
  
  <!-- أيقونة الحرف الداخلية مع تأثير حركة النبض -->
  <g class="z-breathe">
    <path class="st23" d="M15.47,7.1l-1.3,1.85c-0.2,0.29-0.54,0.47-0.9,0.47h-7.1V7.09C6.16,7.1,15.47,7.1,15.47,7.1z"/>
    <polygon class="st23" points="24.3,7.1 13.14,22.91 5.7,22.91 16.86,7.1"/>
    <path class="st23" d="M14.53,22.91l1.31-1.86c0.2-0.29,0.54-0.47,0.9-0.47h7.09v2.33H14.53z"/>
  </g>
</g>
</svg>
